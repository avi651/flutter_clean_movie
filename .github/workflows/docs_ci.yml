name: Deploy Docs

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Build site
        run: |
          mkdir site

          # Convert all markdown files
          for file in docs/*.md; do
            name=$(basename "$file" .md)
            pandoc "$file" -o "site/$name.html"
          done

          # 🔥 FORCE homepage (IMPORTANT)
          if [ -f site/index.html ]; then
            echo "index exists"
          else
            first=$(ls site | head -n 1)
            cp site/$first site/index.html
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site