name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Cache dependencies
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache

      # 3. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # 5. Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 6. Analyze code
      - name: Analyze Code
        run: flutter analyze

      # 7. Run tests
      - name: Run Tests
        run: flutter test

      # 8. Set environment variables (DEV vs PROD)
      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "BASE_URL=${{ secrets.PROD_BASE_URL }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.PROD_API_KEY }}" >> $GITHUB_ENV
          else
            echo "BASE_URL=${{ secrets.DEV_BASE_URL }}" >> $GITHUB_ENV
            echo "API_KEY=${{ secrets.DEV_API_KEY }}" >> $GITHUB_ENV
          fi

      # 9. Build APK with env variables
      - name: Build APK
        run: |
          flutter build apk --release \
          --dart-define=BASE_URL=$BASE_URL \
          --dart-define=API_KEY=$API_KEY

      # 10. Upload APK artifact (FIXED v4)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk