name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Build & Distribute APK
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔹 Cache dependencies
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      # 🔹 Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 🔹 Flutter setup (same as local)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      # 🔹 Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 🔹 Analyze code
      - name: Analyze Code
        run: flutter analyze

      # 🔹 Run tests
      - name: Run Tests
        run: flutter test

      # 🔹 Build APK
      - name: Build APK
        run: |
          flutter build apk --release \
          --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
          --dart-define=API_KEY=${{ secrets.API_KEY }}

      # 🔹 Build AAB (Play Store)
      - name: Build AAB
        run: |
          flutter build appbundle --release \
          --dart-define=BASE_URL=${{ secrets.BASE_URL }} \
          --dart-define=API_KEY=${{ secrets.API_KEY }}

      # 🔹 Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 🔹 Upload AAB artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # 🔹 Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 🔍 Verify secrets (fail early if missing)
      - name: Verify Firebase Secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_APP_ID }}" ]; then echo "❌ FIREBASE_APP_ID missing"; exit 1; else echo "✅ FIREBASE_APP_ID OK"; fi
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then echo "❌ FIREBASE_TOKEN missing"; exit 1; else echo "✅ FIREBASE_TOKEN OK"; fi

      # 🔥 Distribute APK to Firebase
      - name: Distribute APK to Firebase
        run: |
          firebase appdistribution:distribute \
          "build/app/outputs/flutter-apk/app-release.apk" \
          --app "${{ secrets.FIREBASE_APP_ID }}" \
          --groups "testers" \
          --token "${{ secrets.FIREBASE_TOKEN }}"